<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Plife 3D</title>
<style>
body { margin: 0; overflow: hidden; }
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
    background: rgba(0,0,0,0.5);
    padding: 8px;
    border-radius: 6px;
}
</style>
</head>

<body>
<div id="ui">🌴 Plife 3D - NPC Simulation</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// --------------------
// BASIC SCENE
// --------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --------------------
// LIGHT
// --------------------
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 5);
scene.add(light);

// --------------------
// GROUND (ISLAND)
// --------------------
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x3cb371 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// --------------------
// NPC CLASS
// --------------------
class NPC {
    constructor() {
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const mat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
        this.mesh = new THREE.Mesh(geo, mat);

        this.mesh.position.x = (Math.random() - 0.5) * 20;
        this.mesh.position.z = (Math.random() - 0.5) * 20;
        this.mesh.position.y = 0.5;

        scene.add(this.mesh);

        this.target = this.newTarget();
    }

    newTarget() {
        return {
            x: (Math.random() - 0.5) * 20,
            z: (Math.random() - 0.5) * 20
        };
    }

    update() {
        const speed = 0.02;

        const dx = this.target.x - this.mesh.position.x;
        const dz = this.target.z - this.mesh.position.z;

        this.mesh.position.x += dx * speed;
        this.mesh.position.z += dz * speed;

        // pick new target when close
        if (Math.abs(dx) < 0.5 && Math.abs(dz) < 0.5) {
            this.target = this.newTarget();
        }
    }
}

// --------------------
// CREATE NPCs
// --------------------
const npcs = [];
for (let i = 0; i < 8; i++) {
    npcs.push(new NPC());
}

// --------------------
// CAMERA POSITION
// --------------------
camera.position.set(0, 10, 10);
camera.lookAt(0, 0, 0);

// --------------------
// ANIMATION LOOP
// --------------------
function animate() {
    requestAnimationFrame(animate);

    npcs.forEach(npc => npc.update());

    renderer.render(scene, camera);
}

animate();

// --------------------
// RESIZE FIX
// --------------------
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
