<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plife - Island Sim</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #cfefff;
}

#ui {
    padding: 20px;
}

.card {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
}

.log {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #111;
    color: #0f0;
    padding: 10px;
    height: 150px;
    overflow: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<div id="ui">
    <h1>🌴 Plife Island</h1>
    <div id="characters"></div>
</div>

<div class="log" id="log"></div>

<script>
// --------------------
// CHARACTERS
// --------------------
let characters = [
    {name:"Alex", hunger:50, happiness:70, energy:80},
    {name:"Mina", hunger:30, happiness:60, energy:90},
    {name:"Rex", hunger:80, happiness:40, energy:50}
];

const logBox = document.getElementById("log");
const charBox = document.getElementById("characters");

// --------------------
// LOG SYSTEM
// --------------------
function log(msg){
    let div = document.createElement("div");
    div.textContent = msg;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

// --------------------
// RENDER
// --------------------
function render(){
    charBox.innerHTML = "";

    characters.forEach(c => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <b>${c.name}</b><br>
            🍔 Hunger: ${c.hunger}<br>
            😊 Happiness: ${c.happiness}<br>
            ⚡ Energy: ${c.energy}
        `;
        charBox.appendChild(div);
    });
}

// --------------------
// SIM LOOP
// --------------------
function tick(){

    characters.forEach(c => {
        c.hunger += 2;
        c.energy -= 1;

        if(c.hunger > 70){
            c.happiness -= 2;
            log(`${c.name} is getting hungry...`);
        }

        if(c.energy < 30){
            log(`${c.name} is tired.`);
        }
    });

    // random event
    let a = characters[Math.floor(Math.random()*characters.length)];
    let b = characters[Math.floor(Math.random()*characters.length)];

    if(Math.random() < 0.4){
        let events = [
            `${a.name} ate food.`,
            `${a.name} took a walk.`,
            `${a.name} talked with ${b.name}.`,
            `${a.name} got into a small argument with ${b.name}.`
        ];

        log(events[Math.floor(Math.random()*events.length)]);
    }

    render();
}

// --------------------
// START
// --------------------
render();
setInterval(tick, 3000);
</script>

</body>
</html>
