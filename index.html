<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plife</title>

<!-- App Icons -->
<link rel="icon" href="1778409471032_image.png">
<link rel="apple-touch-icon" href="1778409471032_image.png">

<meta name="theme-color" content="#FF6B35">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fdf9e3;
    overflow: hidden;
}

/* Screens */
.screen {
    display: none;
    height: 100vh;
    width: 100%;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.screen.active {
    display: flex;
}

/* HERO */
.logo {
    width: 280px;
    max-width: 90vw;
    margin-bottom: 30px;
}

.start-btn {
    padding: 14px 40px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    background: linear-gradient(#ff9500, #ff7b00);
    color: white;
    cursor: pointer;
}

/* LOADING */
.loading-text {
    font-size: 16px;
    margin-bottom: 20px;
    color: #a05a2c;
}

.bar {
    width: 220px;
    height: 8px;
    background: #ffe0b3;
    border-radius: 20px;
    overflow: hidden;
}

.fill {
    height: 100%;
    width: 0%;
    background: #ff9500;
    transition: width 0.5s;
}

/* GAME */
.game-wrapper {
    width: 100%;
    max-width: 900px;
}

video {
    width: 100%;
    border-radius: 16px;
    background: black;
}

.mute {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
}

/* overlay controls (simplified) */
.overlay {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    color: white;
    font-size: 12px;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="screen active" id="hero">
    <img class="logo" src="image__2_.png">
    <button class="start-btn" onclick="startGame()">Start Playing</button>
</div>

<!-- LOADING -->
<div class="screen" id="loading">
    <div class="loading-text" id="loadingText">Loading...</div>
    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>
</div>

<!-- GAME -->
<div class="screen" id="game" style="position:relative;">
    
    <div class="game-wrapper">
        <video id="video" src="tomo.mp4" autoplay muted playsinline></video>

        <button class="mute" onclick="toggleMute()" id="muteBtn">🔇</button>

        <div class="overlay">
            <div>Plife World</div>
            <div>Controls Active</div>
        </div>
    </div>

</div>

<script>
const screens = {
    hero: document.getElementById("hero"),
    loading: document.getElementById("loading"),
    game: document.getElementById("game")
};

const video = document.getElementById("video");
const fill = document.getElementById("fill");
const text = document.getElementById("loadingText");

function show(id){
    Object.values(screens).forEach(s => s.classList.remove("active"));
    screens[id].classList.add("active");
}

/* START GAME */
function startGame(){
    show("loading");

    const messages = [
        "Loading world...",
        "Spawning characters...",
        "Building island...",
        "Starting simulation..."
    ];

    let i = 0;
    const interval = setInterval(() => {
        text.textContent = messages[i];
        i++;
        if(i >= messages.length) clearInterval(interval);
    }, 1500);

    setTimeout(() => fill.style.width = "40%", 500);
    setTimeout(() => fill.style.width = "80%", 2500);
    setTimeout(() => fill.style.width = "100%", 4000);

    setTimeout(() => {
        show("game");
        video.play().catch(()=>{});
    }, 5000);
}

/* MUTE */
function toggleMute(){
    video.muted = !video.muted;
    document.getElementById("muteBtn").textContent = video.muted ? "🔇" : "🔊";
}

/* LOOP FIX */
video.addEventListener("timeupdate", () => {
    if(video.currentTime > 10.5){
        video.currentTime = 8.5;
    }
});
</script>

</body>
</html>
